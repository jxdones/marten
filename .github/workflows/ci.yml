name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Check, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: make ci

  release:
    name: Build release — ${{ matrix.os }} / ${{ matrix.arch }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            asset_os: linux
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            asset_os: linux
            arch: arm64
          - target: x86_64-apple-darwin
            os: macos-15-intel
            asset_os: darwin
            arch: amd64
          - target: aarch64-apple-darwin
            os: macos-15
            asset_os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="marten_${VERSION}_${{ matrix.asset_os }}_${{ matrix.arch }}.tar.gz"
          tar czf "$ARCHIVE" -C target/${{ matrix.target }}/release marten
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: marten-${{ matrix.asset_os }}-${{ matrix.arch }}
          path: marten_*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: marten-*
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum marten_*.tar.gz > checksums.txt
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/marten_*.tar.gz
            dist/checksums.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
